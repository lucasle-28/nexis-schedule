<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXIS Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: #ffffff;
    color: #1a1a1a;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
  }

  /* --- TOP: Header + Schedule --- */
  .top-section { padding: 4px 10px 0; flex-shrink: 0; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
    height: 22px;
  }

  .logo-area { display: flex; align-items: baseline; gap: 8px; }
  .logo-area h1 { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.12em; }
  .logo-area .subtitle { font-size: 0.55rem; color: #aaa; letter-spacing: 0.03em; }

  .meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
  }
  .meta .clock { font-size: 0.65rem; font-weight: 500; }
  .meta .update-line { font-size: 0.5rem; color: #ccc; }
  .controls { display: flex; gap: 4px; }
  .controls button {
    background: #fff; color: #aaa; border: 1px solid #e8e8e8;
    padding: 1px 6px; border-radius: 2px; font-size: 0.5rem;
    cursor: pointer; font-family: 'JetBrains Mono', monospace;
  }
  .controls button:hover { color: #1a1a1a; border-color: #1a1a1a; }

  /* Team colors */
  .team-vr { background: #e6f4f2; color: #2a8a7e; }
  .team-iot { background: #eee8f6; color: #6a4fb5; }
  .team-ds-sports-a { background: #fef4e0; color: #c67a00; }
  .team-ds-sports-b { background: #fef4e0; color: #c67a00; }
  .team-ai-gaming { background: #fde8ec; color: #c93c54; }
  .team-ai-healthcare { background: #fde8ec; color: #c93c54; }
  .team-ai-education { background: #fde8ec; color: #c93c54; }
  .team-ds-air-quality { background: #e4f0fd; color: #2d6fc1; }
  .team-ds-newteam { background: #fef0e4; color: #c05e1a; }
  .team-3d-ds-sports-b { background: #e6f5e8; color: #2e7d32; }
  .team-3d-ai-education { background: #e6f5e8; color: #2e7d32; }
  .team-default { background: #f5f5f5; color: #777; }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid #ddd; }

  thead th {
    padding: 3px 4px; font-weight: 500; font-size: 0.58rem;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: #ccc; text-align: center; border: 1px solid #ddd;
  }
  thead th:first-child { width: 62px; text-align: right; padding-right: 6px; }
  thead th.current-day { color: #1a1a1a; font-weight: 600; }

  tbody td {
    padding: 0 2px; font-size: 0.6rem; text-align: center;
    height: 18px; vertical-align: middle; border: 1px solid #e5e5e5;
  }
  tbody td:first-child {
    font-family: 'JetBrains Mono', monospace; font-size: 0.5rem;
    color: #d0d0d0; text-align: right; padding-right: 6px;
  }
  tbody td.current-day-col { background: #fafafc; }
  tbody td.has-event { font-weight: 500; font-size: 0.55rem; letter-spacing: 0.01em; }
  tbody tr.current-time-row td { border-bottom: 1.5px solid #1a1a1a; }

  .status { text-align: center; padding: 20px; color: #ddd; font-size: 0.75rem; }
  .status.error { color: #e57373; }

  .dot {
    display: inline-block; width: 5px; height: 5px;
    border-radius: 50%; background: #b8e6b8; margin-right: 4px;
  }

  /* --- BOTTOM BAR --- */
  .bottom-bar {
    flex: 1;
    display: flex;
    align-items: stretch;
    border-top: 1px solid #e5e5e5;
    margin: 6px 10px 6px;
    gap: 10px;
    min-height: 0;
    padding-top: 8px;
  }

  /* QR Code */
  .qr-section {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 0 6px;
  }

  .qr-box {
    width: 100px;
    height: 100px;
    border: 2px dashed #ddd;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fafafa;
    overflow: hidden;
  }

  .qr-box img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .qr-box .placeholder-text {
    font-size: 0.5rem;
    color: #ccc;
    text-align: center;
    padding: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  .qr-label {
    font-size: 0.48rem;
    color: #aaa;
    text-align: center;
    font-weight: 500;
    letter-spacing: 0.03em;
  }

  /* Announcements */
  .announcements-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    justify-content: center;
    padding: 0 8px;
  }

  .announcements-header {
    font-size: 0.52rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #bbb;
    margin-bottom: 6px;
  }

  .announcement-item {
    display: none;
    font-size: 0.75rem;
    font-weight: 500;
    color: #333;
    line-height: 1.4;
  }

  .announcement-item.active { display: block; }

  .announcement-sub {
    font-size: 0.55rem;
    color: #aaa;
    margin-top: 3px;
    font-weight: 400;
  }

  .no-announcements {
    font-size: 0.6rem;
    color: #ddd;
    font-style: italic;
  }

  /* Photos */
  .photos-section {
    flex: 0 0 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-radius: 6px;
    background: #fafafa;
    position: relative;
  }

  .photos-section img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 4px;
    transition: opacity 0.5s;
  }

  .photos-section .no-photos {
    font-size: 0.55rem;
    color: #ddd;
    font-style: italic;
    text-align: center;
  }
</style>
</head>
<body>

<div class="top-section">
  <header>
    <div class="logo-area">
      <h1>NEXIS</h1>
      <div class="subtitle">Weekly Schedule</div>
    </div>
    <div class="meta">
      <div class="update-line" id="update-status"></div>
      <div class="clock" id="clock"></div>
      <div class="controls">
        <button onclick="fetchAll()">refresh</button>
        <button onclick="goFullscreen()">fullscreen</button>
      </div>
    </div>
  </header>
  <div id="schedule-container"><div class="status">Loading...</div></div>
</div>

<div class="bottom-bar">
  <!-- QR Code -->
  <div class="qr-section">
    <div class="qr-box" id="qr-box">
      <div class="placeholder-text">QR CODE<br>COMING SOON</div>
    </div>
    <div class="qr-label">Share your photos!</div>
  </div>

  <!-- Announcements -->
  <div class="announcements-section">
    <div class="announcements-header">Announcements</div>
    <div id="announcements-container">
      <div class="no-announcements">No announcements</div>
    </div>
  </div>

  <!-- Photos -->
  <div class="photos-section" id="photos-container">
    <div class="no-photos">No photos yet</div>
  </div>
</div>

<script>
// ============================================================
//  CONFIG — Update these URLs with your published sheet tabs
// ============================================================

const SCHEDULE_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTgt41gOVD2hcpqHVdsl_XFKbGqCMQy1GXiVnsVcN8zP22h1B2cluC7CuTnG9FeL12QrkovEHpf6_Jc/pub?gid=0&single=true&output=csv';

const ANNOUNCEMENTS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTgt41gOVD2hcpqHVdsl_XFKbGqCMQy1GXiVnsVcN8zP22h1B2cluC7CuTnG9FeL12QrkovEHpf6_Jc/pub?gid=2048449370&single=true&output=csv';

const PHOTOS_URL = 'https://drive.google.com/uc?export=view&id=12_imyRlmYzt-S2PTvSmsfJi-37isxErt';

const QR_CODE_URL = 'https://drive.google.com/file/d/12_imyRlmYzt-S2PTvSmsfJi-37isxErt/view?usp=sharing';

const REFRESH_INTERVAL = 5 * 60 * 1000;
const ANNOUNCEMENT_CYCLE = 6000;
const PHOTO_CYCLE = 8000;
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// ============================================================
//  CSV Parser
// ============================================================
function parseCSV(t) {
  const l = t.trim().split('\n');
  return l.map(line => {
    const r = []; let c = '', q = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') q = !q;
      else if (ch === ',' && !q) { r.push(c.trim()); c = ''; }
      else c += ch;
    }
    r.push(c.trim());
    return r;
  });
}

// ============================================================
//  Schedule
// ============================================================
function teamClass(n) {
  if (!n) return '';
  const k = n.toLowerCase().replace(/&/g,'').replace(/\s+/g,'-').replace(/--+/g,'-');
  const m = {
    'vr':'team-vr','iot':'team-iot',
    'ds-sports-a':'team-ds-sports-a','ds-sports-b':'team-ds-sports-b',
    'ai-gaming':'team-ai-gaming','ai-healthcare':'team-ai-healthcare','ai-education':'team-ai-education',
    'ds-air-quality':'team-ds-air-quality','ds-newteam':'team-ds-newteam',
    '3d-ds-sports-b':'team-3d-ds-sports-b','3d-ai-education':'team-3d-ai-education'
  };
  return m[k] || 'team-default';
}

function fmtTime(r) {
  if (!r) return '';
  const m = r.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM)/i);
  return m ? `${m[1]}:${m[2]} ${m[4].toUpperCase()}` : r;
}

function curRow(times) {
  const now = new Date(), nm = now.getHours() * 60 + now.getMinutes();
  for (let i = 0; i < times.length; i++) {
    const m = times[i].match(/(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM)/i);
    if (!m) continue;
    let h = +m[1], mi = +m[2];
    if (m[4].toUpperCase() === 'PM' && h !== 12) h += 12;
    if (m[4].toUpperCase() === 'AM' && h === 12) h = 0;
    if (nm < h * 60 + mi) return i - 1;
  }
  return times.length - 1;
}

function buildSchedule(data) {
  if (data.length < 2) return '<div class="status error">No data</div>';
  const rows = data.slice(1), day = new Date().getDay(), times = rows.map(r => r[0]), ct = curRow(times);
  let h = '<table><thead><tr><th></th>';
  for (let d = 0; d < 7; d++) h += `<th${d === day ? ' class="current-day"' : ''}>${DAYS[d].substring(0,3)}</th>`;
  h += '</tr></thead><tbody>';
  for (let r = 0; r < rows.length; r++) {
    const row = rows[r], t = fmtTime(row[0]); if (!t) continue;
    h += `<tr${r === ct ? ' class="current-time-row"' : ''}><td>${t}</td>`;
    for (let d = 0; d < 7; d++) {
      const v = (row[d+1]||'').trim(), dc = d === day ? ' current-day-col' : '';
      h += v ? `<td class="has-event ${teamClass(v)}${dc}">${v}</td>` : `<td class="${dc}"></td>`;
    }
    h += '</tr>';
  }
  return h + '</tbody></table>';
}

async function fetchSchedule() {
  const c = document.getElementById('schedule-container');
  try {
    const r = await fetch(SCHEDULE_URL);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    c.innerHTML = buildSchedule(parseCSV(await r.text()));
    document.getElementById('update-status').innerHTML =
      `<span class="dot"></span>updated ${new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;
  } catch(e) {
    if (!c.querySelector('table')) c.innerHTML = `<div class="status error">${e.message}</div>`;
  }
}

// ============================================================
//  Announcements
// ============================================================
let announcements = [];
let annIdx = 0;

async function fetchAnnouncements() {
  if (ANNOUNCEMENTS_URL.includes('REPLACE_WITH')) return;
  try {
    const r = await fetch(ANNOUNCEMENTS_URL);
    if (!r.ok) return;
    const data = parseCSV(await r.text());
    announcements = data.slice(1).filter(row => row[0]).map(row => ({
      title: row[0],
      detail: row[1] || ''
    }));
    renderAnnouncement();
  } catch(e) { console.error('Announcements fetch error:', e); }
}

function renderAnnouncement() {
  const c = document.getElementById('announcements-container');
  if (announcements.length === 0) {
    c.innerHTML = '<div class="no-announcements">No announcements</div>';
    return;
  }
  const a = announcements[annIdx % announcements.length];
  c.innerHTML = `<div class="announcement-item active">
    ${a.title}
    ${a.detail ? `<div class="announcement-sub">${a.detail}</div>` : ''}
  </div>`;
}

function cycleAnnouncement() {
  if (announcements.length <= 1) return;
  annIdx++;
  renderAnnouncement();
}

// ============================================================
//  Photos
// ============================================================
let photos = [];
let photoIdx = 0;

async function fetchPhotos() {
  if (PHOTOS_URL.includes('REPLACE_WITH')) return;
  try {
    const r = await fetch(PHOTOS_URL);
    if (!r.ok) return;
    const data = parseCSV(await r.text());
    photos = data.slice(1).map(row => row[0]).filter(url => url && url.startsWith('http'));
    renderPhoto();
  } catch(e) { console.error('Photos fetch error:', e); }
}

function renderPhoto() {
  const c = document.getElementById('photos-container');
  if (photos.length === 0) {
    c.innerHTML = '<div class="no-photos">No photos yet</div>';
    return;
  }
  const url = photos[photoIdx % photos.length];
  c.innerHTML = `<img src="${url}" alt="Community photo" onerror="this.style.display='none'">`;
}

function cyclePhoto() {
  if (photos.length <= 1) return;
  photoIdx++;
  renderPhoto();
}

// ============================================================
//  QR Code
// ============================================================
function setupQR() {
  if (!QR_CODE_URL) return;
  document.getElementById('qr-box').innerHTML = `<img src="${QR_CODE_URL}" alt="QR Code">`;
}

// ============================================================
//  Utilities
// ============================================================
function goFullscreen() {
  const e = document.documentElement;
  (e.requestFullscreen||e.webkitRequestFullscreen||e.mozRequestFullScreen||e.msRequestFullscreen).call(e);
}

function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'});
}

async function fetchAll() {
  await Promise.all([fetchSchedule(), fetchAnnouncements(), fetchPhotos()]);
}

// ============================================================
//  Init
// ============================================================
setupQR();
tick();
setInterval(tick, 1000);

fetchAll();
setInterval(fetchAll, REFRESH_INTERVAL);

setInterval(cycleAnnouncement, ANNOUNCEMENT_CYCLE);
setInterval(cyclePhoto, PHOTO_CYCLE);

document.addEventListener('visibilitychange', () => { if (!document.hidden) fetchAll(); });
</script>
</body>
</html>
