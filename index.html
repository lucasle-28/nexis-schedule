<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXIS Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    color: #1a1a1a;
    font-family: 'DM Sans', sans-serif;
  }

  .container { padding: 4px 10px; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
    padding-bottom: 0;
    border-bottom: none;
    height: 24px;
  }

  .logo-area { display: flex; align-items: baseline; gap: 8px; }

  .logo-area h1 {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.12em;
  }

  .logo-area .subtitle {
    font-size: 0.55rem;
    color: #aaa;
    margin-top: 0;
    letter-spacing: 0.03em;
  }

  .meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  .meta .clock { font-size: 0.65rem; font-weight: 500; }

  .meta .update-line { font-size: 0.5rem; color: #ccc; margin-top: 0; }

  .controls { display: flex; gap: 4px; margin-top: 0; }

  .controls button {
    background: #fff;
    color: #aaa;
    border: 1px solid #e8e8e8;
    padding: 1px 6px;
    border-radius: 2px;
    font-size: 0.5rem;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s;
  }

  .controls button:hover { color: #1a1a1a; border-color: #1a1a1a; }

  /* Soft pastel team chips */
  .team-vr { background: #e6f4f2; color: #2a8a7e; }
  .team-iot { background: #eee8f6; color: #6a4fb5; }
  .team-ds-sports-a { background: #fef4e0; color: #c67a00; }
  .team-ds-sports-b { background: #fef4e0; color: #c67a00; }
  .team-ai-gaming { background: #fde8ec; color: #c93c54; }
  .team-ai-healthcare { background: #fde8ec; color: #c93c54; }
  .team-ai-education { background: #fde8ec; color: #c93c54; }
  .team-ds-air-quality { background: #e4f0fd; color: #2d6fc1; }
  .team-ds-newteam { background: #fef0e4; color: #c05e1a; }
  .team-3d-ds-sports-b { background: #e6f5e8; color: #2e7d32; }
  .team-3d-ai-education { background: #e6f5e8; color: #2e7d32; }
  .team-default { background: #f5f5f5; color: #777; }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid #ddd; }

  thead th {
    padding: 3px 4px;
    font-weight: 500;
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #ccc;
    text-align: center;
    border: 1px solid #ddd;
  }

  thead th:first-child { width: 62px; text-align: right; padding-right: 6px; }

  thead th.current-day { color: #1a1a1a; font-weight: 600; }

  tbody td {
    padding: 0 2px;
    font-size: 0.6rem;
    text-align: center;
    height: 18px;
    vertical-align: middle;
    border: 1px solid #e5e5e5;
  }

  tbody td:first-child {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem;
    color: #d0d0d0;
    text-align: right;
    padding-right: 6px;
  }

  tbody td.current-day-col { background: #fafafc; }

  tbody td.has-event {
    font-weight: 500;
    font-size: 0.55rem;
    letter-spacing: 0.01em;
  }

  tbody tr.current-time-row td { border-bottom: 1.5px solid #1a1a1a; }

  .status { text-align: center; padding: 60px; color: #ddd; font-size: 0.85rem; }
  .status.error { color: #e57373; }

  .dot {
    display: inline-block;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #b8e6b8;
    margin-right: 4px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-area">
      <h1>NEXIS</h1>
      <div class="subtitle">Weekly Schedule</div>
    </div>
    <div class="meta">
      <div class="update-line" id="update-status"></div>
      <div class="clock" id="clock"></div>
      <div class="controls">
        <button onclick="fetchSchedule()">refresh</button>
        <button onclick="goFullscreen()">fullscreen</button>
      </div>
    </div>
  </header>
  <div id="schedule-container"><div class="status">Loading...</div></div>
</div>

<script>
const URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vTgt41gOVD2hcpqHVdsl_XFKbGqCMQy1GXiVnsVcN8zP22h1B2cluC7CuTnG9FeL12QrkovEHpf6_Jc/pub?gid=0&single=true&output=csv';
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function parseCSV(t){const l=t.trim().split('\n');return l.map(line=>{const r=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"')q=!q;else if(ch===','&&!q){r.push(c.trim());c='';}else c+=ch;}r.push(c.trim());return r;});}

function teamClass(n){if(!n)return'';const k=n.toLowerCase().replace(/&/g,'').replace(/\s+/g,'-').replace(/--+/g,'-');const m={'vr':'team-vr','iot':'team-iot','ds-sports-a':'team-ds-sports-a','ds-sports-b':'team-ds-sports-b','ai-gaming':'team-ai-gaming','ai-healthcare':'team-ai-healthcare','ai-education':'team-ai-education','ds-air-quality':'team-ds-air-quality','ds-newteam':'team-ds-newteam','3d-ds-sports-b':'team-3d-ds-sports-b','3d-ai-education':'team-3d-ai-education'};return m[k]||'team-default';}

function fmtTime(r){if(!r)return'';const m=r.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM)/i);return m?`${m[1]}:${m[2]} ${m[4].toUpperCase()}`:r;}

function curRow(times){const now=new Date(),nm=now.getHours()*60+now.getMinutes();for(let i=0;i<times.length;i++){const m=times[i].match(/(\d{1,2}):(\d{2})(?::(\d{2}))?\s*(AM|PM)/i);if(!m)continue;let h=+m[1],mi=+m[2];if(m[4].toUpperCase()==='PM'&&h!==12)h+=12;if(m[4].toUpperCase()==='AM'&&h===12)h=0;if(nm<h*60+mi)return i-1;}return times.length-1;}

function build(data){
  if(data.length<2)return'<div class="status error">No data</div>';
  const rows=data.slice(1),day=new Date().getDay(),times=rows.map(r=>r[0]),ct=curRow(times);
  let h='<table><thead><tr><th></th>';
  for(let d=0;d<7;d++)h+=`<th${d===day?' class="current-day"':''}>${DAYS[d].substring(0,3)}</th>`;
  h+='</tr></thead><tbody>';
  for(let r=0;r<rows.length;r++){
    const row=rows[r],t=fmtTime(row[0]);if(!t)continue;
    h+=`<tr${r===ct?' class="current-time-row"':''}><td>${t}</td>`;
    for(let d=0;d<7;d++){const v=(row[d+1]||'').trim(),dc=d===day?' current-day-col':'';
      h+=v?`<td class="has-event ${teamClass(v)}${dc}">${v}</td>`:`<td class="${dc}"></td>`;}
    h+='</tr>';}
  return h+'</tbody></table>';}

async function fetchSchedule(){const c=document.getElementById('schedule-container');try{const r=await fetch(URL);if(!r.ok)throw new Error(`HTTP ${r.status}`);c.innerHTML=build(parseCSV(await r.text()));document.getElementById('update-status').innerHTML=`<span class="dot"></span>updated ${new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}`;}catch(e){if(!c.querySelector('table'))c.innerHTML=`<div class="status error">${e.message}</div>`;}}

function goFullscreen(){const e=document.documentElement;(e.requestFullscreen||e.webkitRequestFullscreen||e.mozRequestFullScreen||e.msRequestFullscreen).call(e);}

function tick(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'});}

tick();setInterval(tick,1000);fetchSchedule();setInterval(fetchSchedule,300000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)fetchSchedule();});
</script>
</body>
</html>
